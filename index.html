<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#78b2ac" />
    <title>Agrumì</title>

    <link rel="preload" as="image" href="/layers/muro-carta.webp" />
    <link rel="preload" as="image" href="/loader/ramo.webp" />
    <link rel="preload" as="image" href="/loader/gatto.webp" />

    <!--
      Schermata di caricamento. Sta qui e non in React di proposito: il bundle
      pesa qualche centinaio di kB e va scaricato, parsato ed eseguito prima
      che React possa disegnare, quindi un loader scritto in React non copre
      il tratto peggiore dell'attesa — non può comparire prima di sé stesso.
      Da qui invece dipinge al primo fotogramma.

      Per la stessa ragione lo stile è inline e non in styles.css: un foglio
      collegato è un altro giro di rete prima del primo paint.

      Il fondo arriva a due tempi. Prima il turchese pieno, che è la media
      della carta: è nel documento, quindi non aspetta niente e lo schermo non
      è mai bianco. Poi la carta vera, che entra in dissolvenza quando è
      decodificata — e siccome il colore sotto è già quello giusto, quello che
      si vede comparire è solo la grana.

      `muro-carta.webp` è lo stesso file che la scena R3F usa come fondale
      (Backdrop.jsx), inquadrato con lo stesso cover: fra loader e scena il
      fondo non cambia di un pixel.
    -->
    <style>
      #loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        overflow: hidden;
        background: #78b2ac; /* media della carta: dipinge subito */
        transition: opacity 700ms ease; /* se cambia, aggiorna FADE sotto */
      }

      #loader.is-out {
        opacity: 0;
      }

      #loader .loader-carta {
        position: absolute;
        inset: 0;
        background: url('/layers/muro-carta.webp') center / cover no-repeat;
        opacity: 0;
        transition: opacity 420ms ease;
      }

      #loader .loader-carta.is-in {
        opacity: 1;
      }

      /*
        Gli sprite sono tutti a tela piena 1080x1920 e già allineati fra loro,
        quindi si impilano con una regola sola. La tela sta *dentro* il
        viewport invece di coprirlo: su uno schermo più lungo di 9:16 il logo
        verrebbe tagliato, e la carta attorno riempie benissimo.
      */
      #loader .loader-tela {
        position: absolute;
        top: 50%;
        left: 50%;
        translate: -50% -50%;
        aspect-ratio: 1080 / 1920;
        height: 100dvh;
        /* Le ombre della barra si misurano in `cqw`, cioè in percentuale
           della tela: così restano proporzionate a ogni dimensione di
           schermo invece di ingrossarsi sui telefoni piccoli. */
        container-type: size;
        /* Su desktop resta una colonna verticale sulla carta, come le
           destinazioni: il sito ha una grammatica sola. */
        max-width: 100vw;
      }

      #loader .loader-sprite {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      #loader .loader-sprite,
      #loader .loader-testo,
      #loader .loader-barra {
        opacity: 0;
        transition: opacity 500ms ease;
      }

      #loader .is-in {
        opacity: 1;
      }

      /*
        Soggetto e bolle galleggiano insieme, quindi stanno in un gruppo e
        l'animazione è una sola: le bolle sono il pensiero del gatto e se si
        muovessero per conto loro si staccherebbero da lui. La carta di fondo
        resta ferma — farla ondeggiare la farebbe sembrare acqua.
      */
      #loader .loader-gatto {
        position: absolute;
        inset: 0;
        animation: loader-galleggia 6.5s ease-in-out infinite;
      }

      @keyframes loader-galleggia {
        0%,
        100% {
          translate: 0 0;
        }
        50% {
          translate: 0 -0.7%;
        }
      }

      /*
        Il respiro. Il gatto è un pezzo unico — le parti separate (torace,
        testa, zampe) non si sono potute estrarre dal PSD — quindi si espande
        tutto il corpo: che è poi quello che fa un gatto accucciato, dove il
        fianco si alza e il resto segue appena.

        Il punto è dosare *dove* si espande, e per farlo servono due perni
        diversi, cioè due elementi annidati: un solo `transform-origin` non può
        stare in due posti.

        - in **verticale** il perno sta sul pancino (54%), appena sopra il
          ramo: il fianco si alza, la pancia resta dov'è appoggiata;
        - in **orizzontale** il perno sta sulla testa (44%): così la faccia è
          il punto fermo e a gonfiarsi è il corpo dietro. Col perno al centro
          il muso ondeggerebbe, che è l'effetto da evitare.

        Il ramo è un altro sprite e non respira affatto: le foglie e i limoni
        restano immobili, come devono.

        Ampiezze sotto l'1%, come il gatto della hero (Sprite.jsx): sotto quella
        soglia si legge come respiro, sopra come uno zoom.
      */
      #loader .loader-respiro-x {
        position: absolute;
        inset: 0;
        transform-origin: 44% 74%;
        animation: loader-respiro-x 2.5s ease-in-out infinite;
      }

      #loader .loader-gatto-corpo {
        position: absolute;
        inset: 0;
        transform-origin: 75% 54%;
        animation: loader-respiro-y 2.5s ease-in-out infinite;
      }

      @keyframes loader-respiro-x {
        0%,
        100% {
          scale: 1 1;
        }
        50% {
          scale: 1.006 1;
        }
      }

      @keyframes loader-respiro-y {
        0%,
        100% {
          scale: 1 1;
        }
        50% {
          scale: 1 1.012;
        }
      }

      /*
        Le bolle sono tre file separati e si animano come nei cartoni: compare
        la piccola, poi la media, poi la grande — dal basso verso l'alto, cioè
        nell'ordine in cui il pensiero sale dalla testa del gatto. Restano su
        un momento, poi **spariscono tutte insieme**, e dopo una pausa il ciclo
        ricomincia.

        Per questo servono tre blocchi di keyframes invece di uno solo con
        `animation-delay`: il ritardo sfaserebbe anche l'uscita, e le bolle si
        spegnerebbero a una a una come si sono accese. Qui l'entrata è scalata
        (0%, 12%, 24%) ma l'uscita è alla stessa percentuale per tutte e tre.

        `transform-origin` è il centro di ciascuna bolla *dentro la tela
        piena* — senza, scalerebbero attorno al centro dell'immagine e
        scivolerebbero via. I valori vengono dai bounding box dell'alfa.

        L'animazione tocca anche l'opacità, e in CSS un'animazione batte una
        dichiarazione normale: se partisse subito, le bolle si vedrebbero
        prima di essere entrate. Per questo sta su `.is-in` e non sulla base.
      */
      #loader .loader-bolla.is-in {
        animation: var(--ciclo) 5s ease-in-out infinite;
      }

      #loader .loader-bolla-1 {
        --ciclo: loader-pensiero-1;
        transform-origin: 38.5% 42.9%;
      }

      #loader .loader-bolla-2 {
        --ciclo: loader-pensiero-2;
        transform-origin: 34% 39.6%;
      }

      #loader .loader-bolla-3 {
        --ciclo: loader-pensiero-3;
        transform-origin: 34.5% 33.9%;
      }

      /* Le tre entrate sono sfalsate, l'uscita a 72-80% è comune. */
      @keyframes loader-pensiero-1 {
        0% {
          opacity: 0;
          scale: 0.55;
        }
        9%,
        72% {
          opacity: 1;
          scale: 1;
        }
        80%,
        100% {
          opacity: 0;
          scale: 0.8;
        }
      }

      @keyframes loader-pensiero-2 {
        0%,
        12% {
          opacity: 0;
          scale: 0.55;
        }
        21%,
        72% {
          opacity: 1;
          scale: 1;
        }
        80%,
        100% {
          opacity: 0;
          scale: 0.8;
        }
      }

      @keyframes loader-pensiero-3 {
        0%,
        24% {
          opacity: 0;
          scale: 0.55;
        }
        33%,
        72% {
          opacity: 1;
          scale: 1;
        }
        80%,
        100% {
          opacity: 0;
          scale: 0.8;
        }
      }

      /*
        La riga "Stiamo svegliando il gatto…". È SVG inline e non un webfont
        perché un font collegato è un altro giro di rete prima del primo paint,
        cioè esattamente quello che questa schermata esiste per evitare. I
        tracciati vengono da `loading-screen/asset/testo.svg`.

        Posizione e colore vengono dal riferimento: la banda chiara sopra la
        barra sta a 21.20%/69.58% ed è crema calda, non bianca.
      */
      #loader .loader-testo {
        position: absolute;
        left: 21.2037%;
        top: 69.5833%;
        width: 56.1111%;
        fill: #f5e2c4;
      }

      /*
        I puntini di sospensione si accendono uno alla volta da sinistra e poi
        si spengono insieme, come un "sto pensando" scritto a mano.

        Sono `<ellipse>` dentro il viewBox, quindi accendersi e spegnersi non
        cambia la larghezza di niente: il testo resta ancorato al suo bordo
        sinistro, allineato con la barra sotto. Fossero caratteri veri, il testo
        centrato ballerebbe a ogni puntino.

        Stessa ragione delle bolle per i tre blocchi di keyframes invece di uno
        con `animation-delay`: il ritardo sfaserebbe anche lo spegnimento, e i
        puntini si spegnerebbero a uno a uno come si sono accesi.
      */
      #loader .loader-puntino {
        animation: var(--ciclo) 1.8s ease-in-out infinite;
      }

      #loader .loader-puntino-1 {
        --ciclo: loader-puntino-1;
      }

      #loader .loader-puntino-2 {
        --ciclo: loader-puntino-2;
      }

      #loader .loader-puntino-3 {
        --ciclo: loader-puntino-3;
      }

      @keyframes loader-puntino-1 {
        0%,
        4% {
          opacity: 0;
        }
        12%,
        84% {
          opacity: 1;
        }
        92%,
        100% {
          opacity: 0;
        }
      }

      @keyframes loader-puntino-2 {
        0%,
        29% {
          opacity: 0;
        }
        37%,
        84% {
          opacity: 1;
        }
        92%,
        100% {
          opacity: 0;
        }
      }

      @keyframes loader-puntino-3 {
        0%,
        54% {
          opacity: 0;
        }
        62%,
        84% {
          opacity: 1;
        }
        92%,
        100% {
          opacity: 0;
        }
      }

      /*
        La barra. A differenza degli altri sprite il binario crema **non** è a
        tela piena: l'export del PSD lo mette più grande e più in basso della
        composizione di riferimento, e a tela piena la sua posizione sarebbe
        cotta dentro l'immagine. Ritagliato al bounding box diventa invece un
        riquadro che si piazza dove serve — qui alla misura del riferimento,
        più piccolo e risalito verso il gatto.

        Il riquadro comprende l'ombra cotta, non la sola carta: tagliare sulla
        carta lascerebbe l'ombra fuori dallo sprite.

        Il giallo è **incassato** dentro la carta, non la copre: il crema resta
        visibile tutt'attorno. Le sue misure qui sotto sono in percentuale del
        riquadro, non della tela.

        Tutte queste percentuali le stampa `tools/prep-loader.mjs` leggendo i
        bounding box dell'alfa: non sono trascritte a occhio. Per spostare la
        barra si toccano i tre numeri di `RIF` là dentro e si rilancia.
      */
      #loader .loader-barra {
        position: absolute;
        left: 20.9942%;
        top: 73.1771%;
        width: 57.5663%;
        height: 2.875%;
      }

      #loader .loader-barra-binario {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      #loader .loader-barra-riempimento {
        position: absolute;
        left: 2.1028%;
        top: 10.5263%;
        height: 60.5263%;
        /* La barra piena non arriva al bordo del riquadro: si ferma dove
           finisce la carta, il resto è ombra. L'avanzamento è la frazione
           `--p` di quella corsa, non del riquadro — altrimenti a metà il
           giallo starebbe un 3% più avanti di dove dice di essere. */
        --pieno: 96.729%;
        width: calc(var(--pieno) * var(--p, 0));
        /* Un pallino: sotto questa larghezza la punta arrotondata non avrebbe
           spazio per chiudersi e la forma verrebbe sbagliata. */
        min-width: 5.3738%;
        border-radius: 999px;
        /* `auto 100%` disegna la carta alla sua lunghezza naturale, che è
           quella della barra piena: crescendo, l'elemento la *scopre* invece
           di stirarla, e la grana resta ferma dov'è. */
        background: url('/loader/barra-riempimento.webp') left center / auto 100% no-repeat;
        /* Ombra coerente con quella cotta nel binario — stessa direzione,
           stessa morbidezza — ma circa la metà: il binario è carta sul muro,
           il giallo è carta sopra un'altra carta, sollevata di pochissimo.
           `drop-shadow` segue la sagoma, quindi la punta tonda che avanza si
           porta dietro la sua ombra. */
        filter: drop-shadow(0 0.14cqw 0.13cqw rgba(0, 0, 0, 0.5));
      }

      @media (prefers-reduced-motion: reduce) {
        #loader {
          transition-duration: 1ms;
        }
        #loader .loader-gatto,
        #loader .loader-respiro-x,
        #loader .loader-gatto-corpo,
        #loader .loader-bolla.is-in,
        #loader .loader-puntino {
          animation: none;
        }
      }

      .loader-sr {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip-path: inset(50%);
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <!-- Fratello di #root, non figlio: dentro, React lo cancellerebbe al primo
         render, di colpo e senza uscita. -->
    <div id="loader" role="status" aria-live="polite">
      <div class="loader-carta"></div>

      <div class="loader-tela">
        <img class="loader-sprite loader-logo" src="/loader/logo.webp" alt="Agrumì — Garden Bar" />

        <!-- Ramo, gatto e pensiero galleggiano insieme: un gruppo solo. Il
             gatto sta davanti al ramo perché ci è appoggiato sopra e la coda
             gli ricade davanti. I due `loader-respiro-*` sono i perni del
             respiro, che tocca il solo gatto. -->
        <div class="loader-gatto">
          <img class="loader-sprite loader-ramo" src="/loader/ramo.webp" alt="" />

          <div class="loader-respiro-x">
            <div class="loader-gatto-corpo">
              <img class="loader-sprite" src="/loader/gatto.webp" alt="" />
            </div>
          </div>

          <img class="loader-sprite loader-bolla loader-bolla-1" src="/loader/bolla-1.webp" alt="" />
          <img class="loader-sprite loader-bolla loader-bolla-2" src="/loader/bolla-2.webp" alt="" />
          <img class="loader-sprite loader-bolla loader-bolla-3" src="/loader/bolla-3.webp" alt="" />
        </div>

        }
        ;(fondo.decode ? fondo.decode() : Promise.resolve()).then(entra(carta), entra(carta))

        el.querySelectorAll('.loader-sprite').forEach(function (img) {
          var mostra = entra(img)
          if (img.complete) return mostra()
          img.addEventListener('load', mostra)
          img.addEventListener('error', mostra)
        })

        // Testo e barra sono un blocco solo e devono comparire insieme, ma il
        // testo è SVG inline e non ha un `load` da aspettare: è già lì. Fa
        // quindi da rimorchio al binario, che è l'unico dei due a scaricarsi.
        var barra = el.querySelector('.loader-barra')
        var testo = el.querySelector('.loader-testo')
        var binario = el.querySelector('.loader-barra-binario')
        var mostraBarra = function () {
          barra.classList.add('is-in')
          testo.classList.add('is-in')
        }
        if (binario.complete) mostraBarra()
        else {
          binario.addEventListener('load', mostraBarra)
          binario.addEventListener('error', mostraBarra)
        }

        // Avanzamento. Finché non c'è il precaricamento vero (docs/BACKLOG §1.2) la
        // barra non conosce un numero, quindi non ne dichiara nessuno: si
        // avvicina al 90% e lì rallenta all'infinito, senza mai promettere di
        // essere arrivata. `progress()` è il gancio per quando il numero vero
        // esisterà — allora cambia la sorgente, non la barra.
        var riemp = el.querySelector('.loader-barra-riempimento')
        var p = 0
        var meta = 0.9
        var passo = 0.02

        function avanza() {
          p += (meta - p) * passo
          if (meta - p < 0.0005) p = meta
          riemp.style.setProperty('--p', p.toFixed(4))
          if (p < 0.9999) requestAnimationFrame(avanza)
        }
        requestAnimationFrame(avanza)

        // Durata minima. Serve a due cose: a texture in cache la scena è
        // pronta in pochi millisecondi e uno splash che lampeggia è peggio di
        // nessuno splash; e comunque il gatto che dorme vuole il tempo di
        // essere guardato, altrimenti tanto vale non disegnarlo.
        var MIN = 1200
        var FADE = 700 // deve combaciare con la transition qui sopra

        var nato = Date.now()
        var chiesto = false
        var tolto = false

        function togli() {
          if (tolto) return
          tolto = true
          el.remove()
        }

        function esci() {
          el.classList.add('is-out')
          el.addEventListener('transitionend', togli)
          // A scheda in background transitionend non scatta mai: resterebbe un
          // pannello invisibile a intercettare i click.
          setTimeout(togli, FADE + 200)
        }

        window.__loader = {
          // Gancio per l'avanzamento vero, quando ci sarà: resta sotto al 99%
          // finché non è `done()` a dire che è finita davvero.
          progress: function (v) {
            if (!chiesto) meta = Math.max(meta, Math.min(0.99, v))
          },
          done: function () {
            if (chiesto) return
            chiesto = true
            meta = 1
            passo = 0.14 // la barra chiude in fretta, ma si vede chiudersi
            // Alla barra serve un momento per arrivare in fondo: uscire mentre
            // è a metà è il modo più semplice di far sembrare rotto tutto.
            setTimeout(esci, Math.max(300, MIN - (Date.now() - nato)))
          },
        }
      })()
    </script>
